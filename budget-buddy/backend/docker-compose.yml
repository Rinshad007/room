version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: budget_buddy_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-budgetbuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budgetbuddy123}
      POSTGRES_DB: ${POSTGRES_DB:-budget_buddy}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budgetbuddy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: budget_buddy_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
