services:
  - type: web
    name: budget-buddy-backend
    plan: free
    region: singapore
    rootDir: budget-buddy/backend
    dockerfile: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Budget Buddy
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DEFAULT_CURRENCY
        value: INR
      - key: SECRET_KEY
        value: please-update-in-dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: budget-buddy-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: please-update-in-dashboard

databases:
  - name: budget-buddy-db
    plan: free
    databaseName: budget_buddy
    user: budgetbuddy
