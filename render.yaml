services:
  - type: web
    name: budget-buddy-backend
    runtime: docker
    rootDir: budget-buddy/backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health

    envVars:
      - key: APP_NAME
        value: Budget Buddy
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DEFAULT_CURRENCY
        value: INR
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: ""
      - key: ALLOWED_ORIGINS
        value: ""
