name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: budget-buddy/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: budget-buddy/frontend

      - name: Build frontend
        run: npm run build
        working-directory: budget-buddy/frontend

  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: budgetbuddy
          POSTGRES_PASSWORD: budgetbuddy123
          POSTGRES_DB: budget_buddy_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U budgetbuddy -d budget_buddy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: budget-buddy/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: budget-buddy/backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://budgetbuddy:budgetbuddy123@127.0.0.1:5433/budget_buddy_test
          SECRET_KEY: test-secret-key-for-ci-pipeline-runs-must-be-long-enough-32-chars
          APP_ENV: testing
          ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
        run: |
          pytest tests/ -v
        working-directory: budget-buddy/backend
